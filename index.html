        <div class='absolute right-8 top-10 w-[300px] rounded bg-white p-4 text-xs shadow-md text-neutral-800'
             id='restorePopup'>
            <div class='mb-3 flex items-center justify-between text-[14px] font-semibold leading-none'>
                <div>Restore pages?</div>
                <svg data-slot='icon' fill='none' height='16' stroke-width='1.5' stroke='currentColor'
                     viewBox='0 0 24 24'
                     xmlns='http://www.w3.org/2000/svg' aria-hidden='true' onclick='hidePrompt()'>
                    <path stroke-linecap='round' stroke-linejoin='round' d='M6 18 18 6M6 6l12 12'></path>
                </svg>
            </div>
            <div class='mb-3'>Chrome didn't shut down correctly.</div>
            <div class='flex'>
                <label for='accept-sending-data'></label>
                <input type='checkbox' name='' id='accept-sending-data'
                       class='form-checkbox focus:ring-transparent rounded-sm border-2 border-neutral-400 text-blue-500 mt-1 mr-2' />
                <div class='mb-3'>Help make chrome better by sending crash reports and <a href=''
                                                                                          class='text-blue-500 underline'>usage
                    statistics</a> to google
                </div>
            </div>
            <div class='flex justify-end'>
                <button
                    class='rounded-full bg-blue-500 px-4 py-2 font-medium text-white hover:bg-blue-600 transition-colors duration-500'>
                    Report
                </button>
            </div>

    <button type='button'
            class='text-xs absolute bottom-4 left-[50%] flex gap-1 items-center font-medium text-slate-700 hidden'
            id='reloadWindowBtn' onclick='reloadWindow()'>

                stroke='gray' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' />
        </svg>
        <span>Reload</span>
    </button>
</div>
<script>
    function hidePrompt() {
        let popUp = document.getElementById('restorePopup')
        let reloadWindowBtn = document.getElementById('reloadWindowBtn')
        reloadWindowBtn.classList.remove('hidden')
        popUp.classList.add('hidden')
    }

    function reloadWindow() {
        window.location.reload()
    }


</script>
